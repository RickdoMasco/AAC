<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="header">
</head>

<body>
    <div th:fragment="message">
        <p>
            Dear <span data-th-text="${user.name}">Mario</span> <span data-th-text="${user.surname}">Rossi</span>,
            <br>
            A new OTP code has been generated for you on <b data-th-text="${realm.name}">AAC</b>
            <br>
            To complete the login, use this code <span data-th-text="${code}">Null</span>
            Or click the following link to complete the login:
            <a th:href="${link}" data-th-text="${link}">Link</a>
        </p>
        <p>
            Please contact <a href="mailto:" th:href="'mailto:'+${application.email}">support</a> should you face any
            problem with the access.
        </p>
    </div>
</body>

</html>
